<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Hunter 學習遊戲</title>
  <meta name="theme-color" content="#f5f5fb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1e1e3a" media="(prefers-color-scheme: dark)">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hunter 學習">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root {
      --bg:          linear-gradient(160deg, #f5f5fb 0%, #e8e8f5 100%);
      --text:        #1a1a2e;
      --text-muted:  #5a5a80;
      --accent:      #5b4fcf;
      --accent-glow: rgba(91,79,207,0.25);
      --card-bg:     #ffffff;
      --card-border: #d0d0e0;
      --card-active-border: #5b4fcf;
      --card-active-bg:     rgba(91,79,207,0.08);
      --shadow:      0 2px 12px rgba(0,0,0,0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          linear-gradient(160deg, #0d0d2b 0%, #1a2744 100%);
        --text:        #f0f0ff;
        --text-muted:  #9090b0;
        --accent:      #FFD700;
        --accent-glow: rgba(255,215,0,0.4);
        --card-bg:     rgba(255,255,255,0.05);
        --card-border: #3a3a6a;
        --card-active-border: #FFD700;
        --card-active-bg:     rgba(255,215,0,0.08);
        --shadow:      0 4px 20px rgba(0,0,0,0.4);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Helvetica Neue', 'Microsoft JhengHei', Arial, sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: max(40px, env(safe-area-inset-top, 28px)) 20px max(40px, env(safe-area-inset-bottom, 28px));
      color: var(--text);
    }

    .lobby {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      margin: auto;
    }

    .title-area { text-align: center; }

    .title-icon { font-size: 52px; margin-bottom: 8px; }

    h1 {
      font-size: 28px;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 24px var(--accent-glow);
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .games {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .game-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 20px;
      padding: 20px 22px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      box-shadow: var(--shadow);
    }

    .game-card:active {
      transform: scale(0.97);
      border-color: var(--card-active-border);
      background: var(--card-active-bg);
    }

    .card-icon {
      font-size: 44px;
      flex-shrink: 0;
    }

    .card-text { flex: 1; }

    .card-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .card-arrow {
      font-size: 22px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="lobby">
    <div class="title-area">
      <div class="title-icon">🎮</div>
      <h1>Hunter 學習遊戲</h1>
      <p class="subtitle">選一個遊戲開始吧！</p>
    </div>

    <div class="games">
      <a class="game-card" href="games/math-battle/index.html">
        <div class="card-icon">⚔️</div>
        <div class="card-text">
          <div class="card-title">算數大戰</div>
          <div class="card-desc">答對題目，打敗怪物！</div>
        </div>
        <div class="card-arrow">›</div>
      </a>

      <a class="game-card" href="games/clock-reading/index.html">
        <div class="card-icon">🕐</div>
        <div class="card-text">
          <div class="card-title">學看時鐘</div>
          <div class="card-desc">認識指針時鐘與數字時鐘</div>
        </div>
        <div class="card-arrow">›</div>
      </a>
    </div>
  </div>
</body>
</html>
