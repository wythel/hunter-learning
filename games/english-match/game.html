<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>英文單字配對</title>
  <meta name="theme-color" content="#1e1e3a">
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">
  <div id="game-screen">
    <div id="question-area">
      <div class="progress" id="progress">第 1 / 10 題</div>
      <div id="emoji-display">🍎</div>
      <div id="zh-display">蘋果</div>
    </div>
    <div id="action-area">
      <div id="choices-grid">
        <button class="choice-btn" data-idx="0"></button>
        <button class="choice-btn" data-idx="1"></button>
        <button class="choice-btn" data-idx="2"></button>
        <button class="choice-btn" data-idx="3"></button>
      </div>
    </div>
  </div>

  <div id="result-screen" class="hidden">
    <div class="result-content">
      <div class="result-title" id="result-title">完成！</div>
      <div class="stars-display" id="stars-display">⭐⭐⭐</div>
      <div class="result-stats">
        <div class="stat">
          <span class="stat-icon">✅</span>
          <span class="stat-label">答對</span>
          <span class="stat-value" id="correct-count">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">❌</span>
          <span class="stat-label">答錯</span>
          <span class="stat-value" id="wrong-count">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">⏱️</span>
          <span class="stat-label">用時</span>
          <span class="stat-value" id="time-count">—</span>
        </div>
      </div>
      <div class="result-btns">
        <button class="result-btn primary" id="retry-btn">再玩一次</button>
        <button class="result-btn secondary" id="menu-btn">換設定</button>
        <button class="result-btn lobby" id="lobby-btn">回到大廳</button>
      </div>
    </div>
  </div>

  <script src="effects.js"></script>
  <script src="game.js"></script>
</body>
</html>
