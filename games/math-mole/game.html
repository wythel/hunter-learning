<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>打地鼠算數</title>
  <meta name="theme-color" content="#1e1e3a">
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">
  <div id="game-screen">
    <div id="top-bar">
      <div id="timer-display">60</div>
      <div id="score-display">0 分</div>
    </div>
    <div id="question-display">3 + 5 = ?</div>
    <div id="mole-grid">
      <!-- 9 holes generated by JS -->
    </div>
  </div>

  <div id="result-screen" class="hidden">
    <div class="result-content">
      <div class="result-title" id="result-title">時間到！</div>
      <div class="stars-display" id="stars-display">⭐⭐⭐</div>
      <div class="result-stats">
        <div class="stat">
          <span class="stat-icon">✅</span>
          <span class="stat-label">答對題數</span>
          <span class="stat-value" id="correct-count">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">❌</span>
          <span class="stat-label">打錯次數</span>
          <span class="stat-value" id="wrong-count">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">🏆</span>
          <span class="stat-label">最終得分</span>
          <span class="stat-value" id="time-count">—</span>
        </div>
      </div>
      <div class="result-btns">
        <button class="result-btn primary" id="retry-btn">再玩一次</button>
        <button class="result-btn secondary" id="menu-btn">換設定</button>
        <button class="result-btn lobby" id="lobby-btn">回到大廳</button>
      </div>
    </div>
  </div>

  <script src="effects.js"></script>
  <script src="game.js"></script>
</body>
</html>
