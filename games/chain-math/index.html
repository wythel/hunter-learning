<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>連鎖算數大戰</title>
  <meta name="theme-color" content="#1e1e3a">
  <link rel="stylesheet" href="style.css">
</head>
<body class="start-body">
  <div class="start-screen">
    <div class="title-area">
      <div class="title-icon">➕</div>
      <h1 class="title">連鎖算數大戰</h1>
      <p class="subtitle">三個數字，一次算完！</p>
    </div>

    <div class="settings-card">
      <div class="setting-group">
        <div class="setting-label">運算類型</div>
        <div class="btn-group" id="operation-group">
          <button class="option-btn active" data-value="add">
            <span class="btn-icon">➕</span>
            <span class="btn-text">加法</span>
            <span class="btn-sub">全加法</span>
          </button>
          <button class="option-btn" data-value="sub">
            <span class="btn-icon">➖</span>
            <span class="btn-text">減法</span>
            <span class="btn-sub">全減法</span>
          </button>
          <button class="option-btn" data-value="mix">
            <span class="btn-icon">🔀</span>
            <span class="btn-text">混合</span>
            <span class="btn-sub">加減混合</span>
          </button>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-label">選擇難度</div>
        <div class="btn-group" id="difficulty-group">
          <button class="option-btn active" data-value="easy">
            <span class="btn-icon">⭐</span>
            <span class="btn-text">簡單</span>
            <span class="btn-sub">個位數</span>
          </button>
          <button class="option-btn" data-value="hard">
            <span class="btn-icon">⭐⭐</span>
            <span class="btn-text">困難</span>
            <span class="btn-sub">雙位數</span>
          </button>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-label">題目數量</div>
        <div class="btn-group" id="count-group">
          <button class="option-btn active" data-value="5">5 題</button>
          <button class="option-btn" data-value="10">10 題</button>
          <button class="option-btn" data-value="15">15 題</button>
        </div>
      </div>
    </div>

    <button class="start-btn" id="start-btn">開始冒險！</button>
    <a class="back-link" href="../../index.html">← 回到大廳</a>
  </div>

  <script>
    let selectedOperation = 'add';
    let selectedDifficulty = 'easy';
    let selectedCount = 5;

    document.getElementById('operation-group').addEventListener('click', e => {
      const btn = e.target.closest('.option-btn');
      if (!btn) return;
      document.querySelectorAll('#operation-group .option-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedOperation = btn.dataset.value;
    });

    document.getElementById('difficulty-group').addEventListener('click', e => {
      const btn = e.target.closest('.option-btn');
      if (!btn) return;
      document.querySelectorAll('#difficulty-group .option-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedDifficulty = btn.dataset.value;
    });

    document.getElementById('count-group').addEventListener('click', e => {
      const btn = e.target.closest('.option-btn');
      if (!btn) return;
      document.querySelectorAll('#count-group .option-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCount = parseInt(btn.dataset.value);
    });

    document.getElementById('start-btn').addEventListener('click', () => {
      const params = new URLSearchParams({
        operation: selectedOperation,
        difficulty: selectedDifficulty,
        count: selectedCount
      });
      window.location.href = `game.html?${params}`;
    });
  </script>
</body>
</html>
