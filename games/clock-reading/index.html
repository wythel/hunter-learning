<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>學看時鐘</title>
  <meta name="theme-color" content="#1e1e3a">
  <link rel="stylesheet" href="style.css">
</head>
<body class="start-body">
  <div class="start-screen">
    <div class="title-area">
      <div class="title-icon">🕐</div>
      <h1 class="title">學看時鐘</h1>
      <p class="subtitle">認識指針時鐘與數字時鐘</p>
    </div>

    <div class="settings-card">
      <div class="setting-group">
        <div class="setting-label">遊戲模式</div>
        <div class="btn-group" id="mode-group">
          <button class="option-btn active" data-value="read">
            讀時鐘
            <span class="btn-sub">看指針選時間</span>
          </button>
          <button class="option-btn" data-value="set">
            撥時鐘
            <span class="btn-sub">看數字設指針</span>
          </button>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-label">難度</div>
        <div class="btn-group" id="difficulty-group">
          <button class="option-btn active" data-value="hour">
            整點
            <span class="btn-sub">1:00、3:00</span>
          </button>
          <button class="option-btn" data-value="half">
            半點
            <span class="btn-sub">1:30、5:00</span>
          </button>
          <button class="option-btn" data-value="precise">
            精確
            <span class="btn-sub">3:15、7:45</span>
          </button>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-label">題數</div>
        <div class="btn-group" id="count-group">
          <button class="option-btn active" data-value="5">5 題</button>
          <button class="option-btn" data-value="10">10 題</button>
          <button class="option-btn" data-value="15">15 題</button>
        </div>
      </div>
    </div>

    <button class="start-btn" id="start-btn">開始！</button>
    <a class="back-link" href="../../index.html">← 回到大廳</a>
  </div>

  <script>
    let mode = 'read', difficulty = 'hour', count = 5;

    function bindGroup(id, setter) {
      document.getElementById(id).addEventListener('click', e => {
        const btn = e.target.closest('.option-btn');
        if (!btn) return;
        document.querySelectorAll(`#${id} .option-btn`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        setter(btn.dataset.value);
        Sound && Sound.click();
      });
    }

    bindGroup('mode-group',       v => mode = v);
    bindGroup('difficulty-group', v => difficulty = v);
    bindGroup('count-group',      v => count = parseInt(v));

    document.getElementById('start-btn').addEventListener('click', () => {
      const p = new URLSearchParams({ mode, difficulty, count });
      window.location.href = `game.html?${p}`;
    });
  </script>
</body>
</html>
