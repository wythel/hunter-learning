<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>學看時鐘</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">

  <!-- ===== Game Screen ===== -->
  <div id="game-screen">

    <!-- Clock area: analog + digital always visible -->
    <div id="clock-area">
      <div id="analog-wrapper">
        <svg id="clock-svg" viewBox="0 0 300 300"
             xmlns="http://www.w3.org/2000/svg"></svg>
      </div>

      <div id="digital-clock" class="no-blink">
        <span id="dig-hour">?</span>
        <span class="dig-colon">:</span>
        <span id="dig-minute">??</span>
      </div>

      <div id="set-instruction"></div>
    </div>

    <!-- Action area: choices (mode 1) or confirm (mode 2) -->
    <div id="action-area">
      <div class="progress" id="progress">第 1 / 10 題</div>

      <!-- Mode 1: 4 digital time choices -->
      <div id="choices-grid">
        <button class="choice-btn" data-idx="0"></button>
        <button class="choice-btn" data-idx="1"></button>
        <button class="choice-btn" data-idx="2"></button>
        <button class="choice-btn" data-idx="3"></button>
      </div>

      <!-- Mode 2: set clock controls -->
      <div id="set-controls" class="hidden">
<button id="confirm-btn" disabled>確認</button>
      </div>
    </div>
  </div>

  <!-- ===== Result Screen ===== -->
  <div id="result-screen" class="hidden">
    <div class="result-content">
      <div class="result-title" id="result-title">完成！</div>
      <div class="stars-display" id="stars-display">⭐⭐⭐</div>
      <div class="result-stats">
        <div class="stat">
          <span class="stat-icon">✅</span>
          <span class="stat-label">答對</span>
          <span class="stat-value" id="correct-count">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">❌</span>
          <span class="stat-label">答錯</span>
          <span class="stat-value" id="wrong-count">—</span>
        </div>
        <div class="stat">
          <span class="stat-icon">⏱️</span>
          <span class="stat-label">用時</span>
          <span class="stat-value" id="time-count">—</span>
        </div>
      </div>
      <div class="result-btns">
        <button class="result-btn primary" id="retry-btn">再玩一次</button>
        <button class="result-btn secondary" id="menu-btn">換設定</button>
        <button class="result-btn lobby" id="lobby-btn">回到大廳</button>
      </div>
    </div>
  </div>

  <script src="effects.js"></script>
  <script src="clock.js"></script>
  <script src="game.js"></script>
</body>
</html>
