<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="512" height="512" rx="100" fill="#1e1e3a"/>
  <!-- clock face -->
  <circle cx="256" cy="256" r="190" fill="#FFFEF5" stroke="#3a3a6a" stroke-width="12"/>
  <!-- tick marks -->
  <line x1="256" y1="80" x2="256" y2="108" stroke="#1e1e3a" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="404" x2="256" y2="432" stroke="#1e1e3a" stroke-width="14" stroke-linecap="round"/>
  <line x1="80" y1="256" x2="108" y2="256" stroke="#1e1e3a" stroke-width="14" stroke-linecap="round"/>
  <line x1="404" y1="256" x2="432" y2="256" stroke="#1e1e3a" stroke-width="14" stroke-linecap="round"/>
  <!-- hour hand (pointing ~10 o'clock) -->
  <line x1="256" y1="256" x2="178" y2="162" stroke="#1e1e3a" stroke-width="22" stroke-linecap="round"/>
  <!-- minute hand (pointing ~2 o'clock) -->
  <line x1="256" y1="256" x2="340" y2="140" stroke="#44446a" stroke-width="14" stroke-linecap="round"/>
  <!-- center dot -->
  <circle cx="256" cy="256" r="18" fill="#1e1e3a"/>
</svg>
