<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a1a4e"/>

  <!-- Book body -->
  <rect x="110" y="160" width="292" height="220" rx="12" fill="#3a3a9e"/>
  <!-- Book spine -->
  <rect x="110" y="160" width="24" height="220" rx="6" fill="#5b4fcf"/>
  <!-- Book pages right edge -->
  <rect x="378" y="168" width="12" height="204" rx="4" fill="#e0e0f5"/>

  <!-- Book lines (pages) -->
  <line x1="155" y1="210" x2="360" y2="210" stroke="#7070cc" stroke-width="10" stroke-linecap="round"/>
  <line x1="155" y1="245" x2="360" y2="245" stroke="#7070cc" stroke-width="10" stroke-linecap="round"/>
  <line x1="155" y1="280" x2="300" y2="280" stroke="#7070cc" stroke-width="10" stroke-linecap="round"/>

  <!-- Stars -->
  <text x="290" y="155" font-size="64" fill="#FFD700" text-anchor="middle">★</text>
  <text x="380" y="120" font-size="42" fill="#FFD700" text-anchor="middle">★</text>
  <text x="200" y="130" font-size="32" fill="#FFD700" text-anchor="middle">★</text>

  <!-- "H" letter on book -->
  <text x="256" y="340" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif">H</text>
</svg>
